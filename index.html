<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infiltrado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#7C3AED', dark: '#5B21B6', light: '#A78BFA' }
          },
          fontFamily: { game: ['system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .screen { display: none; }
    .screen.active { display: flex; }
    .vote-card.selected { @apply ring-4 ring-brand scale-105; }
    .vote-card.voted { @apply opacity-50 pointer-events-none; }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop .35s ease forwards; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .shake { animation: shake .3s ease; }
  </style>
</head>
<body class="h-full bg-gray-950 text-white font-game select-none">

  <!-- Main Container -->
  <main id="app" class="h-full max-w-md mx-auto p-6 flex flex-col items-center justify-center">
    
    <!-- Login Screen -->
    <section id="screen-login" class="screen active flex-col items-center w-full gap-8 pop">
      <div class="text-center">
        <h1 class="text-6xl font-black italic tracking-tighter text-brand drop-shadow-[0_0_15px_rgba(124,58,237,0.5)]">INFILTRADO</h1>
        <p class="text-gray-400 mt-2 font-medium tracking-wide">¿Quién no encaja?</p>
      </div>
      
      <div class="w-full space-y-4">
        <input id="login-username" type="text" placeholder="Tu nombre..." 
          class="w-full bg-gray-900 border-2 border-gray-800 rounded-2xl p-4 text-center text-xl font-bold focus:border-brand transition-all outline-none" />
        
        <div id="login-actions" class="grid grid-cols-2 gap-4">
          <button id="btn-create-init" class="bg-brand hover:bg-brand-dark rounded-2xl p-4 font-black uppercase tracking-widest transition-all">
            Crear Sala
          </button>
          <button id="btn-join-init" class="bg-gray-800 hover:bg-gray-700 rounded-2xl p-4 font-black uppercase tracking-widest transition-all">
            Unirse
          </button>
        </div>

        <div id="join-container" class="hidden space-y-4 pt-4 border-t border-gray-800">
            <input id="join-code" type="text" placeholder="CÓDIGO" maxlength="6"
                class="w-full bg-gray-900 border-2 border-gray-800 rounded-2xl p-4 text-center text-2xl font-black tracking-[0.5em] focus:border-brand transition-all outline-none uppercase" />
            <button id="btn-join-confirm" class="w-full bg-brand rounded-2xl p-4 font-black uppercase tracking-widest">
                Entrar a la sala
            </button>
        </div>

        <div id="config-container" class="hidden space-y-4 pt-4 border-t border-gray-800">
            <h3 class="text-center font-bold text-gray-500 uppercase text-sm tracking-widest">Configuración de partida</h3>
            <div class="bg-gray-900 p-4 rounded-2xl space-y-4">
                <div class="flex justify-between items-center">
                    <span class="font-bold">Infiltrado recibe</span>
                    <select id="config-infiltrado-word" class="bg-gray-800 rounded-lg p-2 outline-none">
                        <option value="similar">Palabra Similar</option>
                        <option value="none">Nada (En blanco)</option>
                    </select>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold">Mostrar Categoría</span>
                    <select id="config-show-category" class="bg-gray-800 rounded-lg p-2 outline-none">
                        <option value="all">A todos</option>
                        <option value="civil">Solo Civiles</option>
                        <option value="none">A nadie</option>
                    </select>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold">Rondas</span>
                    <input id="config-rounds" type="number" value="3" min="1" max="10" class="w-16 bg-gray-800 rounded-lg p-2 text-center" />
                </div>
            </div>
            <button id="btn-create-confirm" class="w-full bg-brand rounded-2xl p-4 font-black uppercase tracking-widest">
                Crear Sala
            </button>
        </div>
      </div>
    </section>

    <!-- Lobby Screen -->
    <section id="screen-lobby" class="screen flex-col items-center w-full gap-6">
      <div class="w-full flex justify-between items-center bg-gray-900/50 p-4 rounded-2xl">
        <div id="room-code-display" class="text-3xl font-black text-brand tracking-widest">####</div>
        <button id="btn-share" class="p-2 hover:bg-gray-800 rounded-xl transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
          </svg>
        </button>
      </div>

      <div class="w-full flex-1 overflow-y-auto space-y-3 py-4" id="players-list">
        <!-- Players items -->
      </div>

      <div class="w-full space-y-3" id="admin-controls">
        <button id="btn-start" class="w-full bg-brand hover:bg-brand-dark rounded-2xl p-4 text-xl font-black uppercase tracking-widest transition-all shadow-lg shadow-brand/20">
          Comenzar Juego
        </button>
      </div>
      <div class="w-full text-center py-4 text-gray-500 italic hidden" id="waiting-message">
        Esperando al host...
      </div>
    </section>

    <!-- Game Screen -->
    <section id="screen-game" class="screen flex-col items-center w-full gap-6">
      <div class="w-full text-center space-y-4">
        <div id="game-status" class="bg-brand/20 text-brand font-bold px-4 py-1 rounded-full inline-block text-xs tracking-widest uppercase">RONDA 1</div>
        <div id="word-container" class="bg-gray-900 border-2 border-brand p-8 rounded-3xl w-full">
          <p id="category-display" class="text-brand text-xs font-black uppercase mb-1 hidden"></p>
          <p class="text-gray-400 text-sm uppercase tracking-widest mb-2 font-bold">Tu palabra es:</p>
          <h2 id="player-word" class="text-4xl font-black tracking-tight uppercase">??????</h2>
        </div>
        
        <div id="turn-order-container" class="w-full bg-gray-900/50 p-4 rounded-2xl border border-gray-800">
            <p class="text-[10px] uppercase text-gray-500 font-black mb-3 text-center">Orden de descripción</p>
            <div id="turn-list" class="flex flex-wrap justify-center gap-2">
                <!-- Players list -->
            </div>
        </div>
      </div>

      <div id="voting-area" class="w-full flex-1 overflow-y-auto hidden">
        <h3 class="text-xl font-black text-center mb-4 text-gray-400 uppercase tracking-widest">¿Quién es el infiltrado?</h3>
        <div id="vote-grid" class="grid grid-cols-2 gap-4 pb-4">
          <!-- Players cards for voting -->
        </div>
      </div>

      <div id="turn-info" class="text-center text-gray-400 italic">
        ¡Describe tu palabra sin decirla!
      </div>
      
      <button id="btn-show-voting" class="w-full bg-brand/20 hover:bg-brand/30 border-2 border-brand text-brand rounded-2xl p-4 font-black uppercase tracking-widest transition-all hidden">
        Ir a Votación
      </button>
    </section>

    <!-- Results Screen -->
    <section id="screen-results" class="screen flex-col items-center w-full gap-6">
      <h2 class="text-4xl font-black italic tracking-tighter text-brand">RESULTADOS</h2>
      <div id="results-winner" class="text-2xl font-bold text-center py-4"></div>
      <div id="results-list" class="w-full space-y-3"></div>
      <button id="btn-back-lobby" class="w-full bg-brand rounded-2xl p-4 font-black uppercase tracking-widest transition-all mt-4">
        Volver al Lobby
      </button>
    </section>

  </main>

  <template id="tpl-player">
    <div class="flex items-center gap-4 bg-gray-900/50 p-4 rounded-2xl border-2 border-transparent transition-all">
      <div class="w-12 h-12 rounded-xl bg-brand/20 flex items-center justify-center font-black text-brand text-xl">
        A
      </div>
      <div class="flex-1 font-bold truncate">Username</div>
      <div class="status-indicator w-3 h-3 rounded-full bg-gray-800"></div>
    </div>
  </template>

  <template id="tpl-vote-card">
    <button class="vote-card flex flex-col items-center gap-3 bg-gray-900 border-2 border-gray-800 p-4 rounded-2xl transition-all hover:border-brand/50">
      <div class="w-16 h-16 rounded-2xl bg-brand/10 flex items-center justify-center font-black text-brand text-2xl">
        U
      </div>
      <span class="font-bold text-sm truncate w-full text-center">Username</span>
    </button>
  </template>

  <!-- Scripts -->
  <script src="js/GameAPI.js"></script>
  <script src="js/game.js" type="module"></script>
</body>
</html>
